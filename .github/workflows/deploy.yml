name: Build Push Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }} .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}

    - name: Update Helm + Push
      run: |
        git config user.name github-actions
        git config user.email actions@github.com
        git pull origin main --rebase
        sed -i "s/tag:.*/tag: ${{ github.sha }}/" chart/values.yaml
        git add chart/values.yaml
        git commit -m "update image tag" || echo "No changes"
        git push origin main
